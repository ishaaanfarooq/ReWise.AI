<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewise AI — Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #fdf8f0 0%, #f5e6d3 35%, #e8d5b7 70%, #dfc9a0 100%);
      color: #3d2b1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 540px;
      width: 100%;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(184, 134, 11, 0.12);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 8px 40px rgba(139, 90, 43, 0.1), 0 1px 3px rgba(139, 90, 43, 0.06);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #b8860b, #d4a574);
      color: #fff;
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #2c1810;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .subtitle {
      font-size: 15px;
      color: #7a6652;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .subtitle strong { color: #4a3425; }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184, 134, 11, 0.15), transparent);
      margin-bottom: 28px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #b8860b;
      margin-bottom: 16px;
    }
    .steps {
      list-style: none;
      padding: 0;
      margin-bottom: 28px;
    }
    .steps li {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(184, 134, 11, 0.06);
      font-size: 14px;
      color: #5c4a3a;
      line-height: 1.6;
    }
    .steps li:last-child { border-bottom: none; padding-bottom: 0; }
    .step-icon {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #fef9f0, #f5e6d3);
      border: 1px solid rgba(184, 134, 11, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .steps li strong {
      color: #3d2b1f;
    }
    .notice {
      background: linear-gradient(135deg, #fef9f0, #fdf3e4);
      border: 1px solid rgba(184, 134, 11, 0.1);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 13px;
      color: #7a6652;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .notice-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .notice strong { color: #5c4a3a; }
    .close-msg {
      text-align: center;
      font-size: 13px;
      color: #a0917e;
      font-weight: 500;
    }
    .close-msg .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #d4a574;
      border-radius: 50%;
      margin: 0 2px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .close-msg .dot:nth-child(2) { animation-delay: 0.2s; }
    .close-msg .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .error-card {
      text-align: center;
    }
    .error-card .icon { font-size: 48px; margin-bottom: 16px; }
    .error-card h1 { color: #8b3a3a; font-size: 22px; }
    .error-card p { color: #7a6652; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="content">
      <p style="color: #a0917e; font-size: 14px;">Authenticating...</p>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
